[[mgr.prepend_keymap]]
on = ["g", "l"]
run = "plugin lazygit"
desc = "run lazygit"

[[mgr.prepend_keymap]]
on = "l"
run = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on = "<enter>"
run = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on = "<C-space>"
run = '''
  shell 'qlmanage -p "$@"' --confirm
'''

[[mgr.prepend_keymap]]
on = ["c", "m"]
run = "plugin chmod"
desc = "Chmod on selected files"

[[mgr.prepend_keymap]]
on = "<C-d>"
run = "plugin diff"
desc = "Diff the selected with the hovered file"


[[mgr.prepend_keymap]]
on = ["g", "C"]
run = "cd ~/dotfiles/"
desc = "Goto ~/dotfiles/"

[[mgr.prepend_keymap]]
on = "M"
run = "plugin mount"

[[mgr.prepend_keymap]]
on = "F"
run = "plugin smart-filter"
desc = "Smart filter"

[[mgr.prepend_keymap]]
on = "T"
run = "plugin toggle-pane min-preview"
desc = "Show or hide the preview pane"

[[mgr.prepend_keymap]]
on = ["g", "y"]
run = ["yank", 'plugin clipboard -- --action=copy']
desc = "Yank the selected file paths to clipboard"

[[mgr.prepend_keymap]]
on = ["g", "p"]
run = ['plugin clipboard -- --action=paste']
desc = "Paste file paths from clipboard"

[[mgr.prepend_keymap]]
run = "plugin eza-preview"
on = ["e", "t"]
desc = "Toggle tree/list dir preview"
[[mgr.prepend_keymap]]
on = ["e", "-"]
run = "plugin eza-preview inc-level"
desc = "Increment tree level"
[[mgr.prepend_keymap]]
on = ["e", "_"]
run = "plugin eza-preview dec-level"
desc = "Decrement tree level"
[[mgr.prepend_keymap]]
on = ["e", "$"]
run = "plugin eza-preview toggle-follow-symlinks"
desc = "Toggle tree follow symlinks"
[[mgr.prepend_keymap]]
on = ["e", "*"]
run = "plugin eza-preview toggle-hidden"
desc = "Toggle hidden files"
[[mgr.prepend_keymap]]
on = ["e", "g", "i"]
run = "plugin eza-preview toggle-git-ignore"
desc = "Toggle .gitignore files"
[[mgr.prepend_keymap]]
on = ["e", "g", "s"]
run = "plugin eza-preview toggle-git-status"
desc = "Toggle showing git status"
